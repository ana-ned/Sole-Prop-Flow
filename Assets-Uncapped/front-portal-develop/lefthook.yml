pre-commit:
  parallel: true
  commands:
    oxlint:
      glob: "{src,cypress}/**/*.{js,jsx,ts,tsx}"
      run: pnpm exec oxlint --fix {staged_files}
      stage_fixed: true

    prettier:
      glob: "{src,cypress,public/static}/**/*.{js,jsx,ts,tsx,json}"
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}

pre-push:
  parallel: true
  commands:
    types:
      run: pnpm lint:types
    types-cypress:
      run: pnpm exec tsc --project cypress/tsconfig.json --noEmit
    knip:
      run: pnpm exec knip
    test:
      run: pnpm test
